<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>测测你有多适合当产品经理（2026版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* 未挂载 Vue 前隐藏模板，避免露出 {{ }} 和无法点击的弹窗 */
[v-cloak] { display: none !important; }
/* ========== CSS Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-primary: #4F46E5;
  --c-primary-light: #EEF2FF;
  --c-primary-dark: #4338CA;
  --c-success: #10B981;
  --c-success-light: #D1FAE5;
  --c-warning: #F59E0B;
  --c-warning-light: #FEF3C7;
  --c-danger: #EF4444;
  --c-danger-light: #FEE2E2;
  --c-bg: #F8F9FB;
  --c-card: #FFFFFF;
  --c-text: #111827;
  --c-text-secondary: #6B7280;
  --c-text-light: #9CA3AF;
  --c-border: #E5E7EB;
  --c-border-hairline: #F3F4F6;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-slide: cubic-bezier(0.32, 0.72, 0, 1);
  --slide-duration: 0.42s;
}

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-sans);
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.6;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  position: relative;
}

/* ========== Utility ========== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* ========== Nav Bar ========== */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 52px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border-hairline);
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--c-text-secondary);
  font-size: 14px;
  cursor: pointer;
  padding: 8px 4px;
  min-width: 44px;
  min-height: 44px;
  border-radius: 8px;
  transition: color 0.15s;
  font-family: var(--font-sans);
}
.nav-back:hover { color: var(--c-text); }
.nav-back:disabled { opacity: 0.3; cursor: default; }

.nav-back svg { width: 16px; height: 16px; }

.nav-bar--welcome {
  position: relative;
}

.lang-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  padding: 0;
  background: none;
  border: none;
  border-radius: 10px;
  color: var(--c-primary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background 0.15s, color 0.15s;
}
.lang-btn:hover { background: var(--c-primary-light); }
.lang-btn svg { width: 22px; height: 22px; }
.lang-btn-label {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

.nav-next {
  flex-direction: row-reverse;
  justify-content: flex-end;
}

.nav-progress-text {
  font-size: 13px;
  color: var(--c-text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* ========== Progress Bar ========== */
.progress-bar-wrap {
  height: 3px;
  background: var(--c-border);
  transition: opacity 0.3s;
}
.progress-bar-fill {
  height: 100%;
  background: var(--c-primary);
  transition: width 0.4s var(--ease-out);
  border-radius: 0 2px 2px 0;
}
.progress-bar-fill.complete { background: var(--c-success); }

/* ========== Page Content ========== */
.page-content {
  flex: 1;
  padding: 20px 16px 32px;
  display: flex;
  flex-direction: column;
}

/* ========== Welcome Page ========== */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px 8px;
  animation: fadeInUp 0.6s var(--ease-out);
}

.welcome-icon {
  width: 72px;
  height: 72px;
  background: var(--c-primary-light);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.welcome-icon svg { width: 36px; height: 36px; color: var(--c-primary); }

.welcome h1 {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}

.welcome-sub {
  font-size: 14px;
  color: var(--c-text-secondary);
  line-height: 1.6;
  margin-bottom: 8px;
  max-width: 340px;
}

.welcome-hint {
  font-size: 11px;
  color: var(--c-text-light);
  line-height: 1.5;
  margin-bottom: 28px;
  max-width: 340px;
}

.welcome-info {
  display: flex;
  gap: 24px;
  margin-bottom: 28px;
}
.welcome-info-item { text-align: center; }
.welcome-info-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--c-primary);
  font-variant-numeric: tabular-nums;
}
.welcome-info-label { font-size: 11px; color: var(--c-text-light); margin-top: 2px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 32px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  font-family: var(--font-sans);
  min-height: 48px;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--c-primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3);
}
.btn-primary:hover { background: var(--c-primary-dark); }

.btn-ghost {
  background: transparent;
  color: var(--c-text-secondary);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  min-height: 40px;
}
.btn-ghost:hover { color: var(--c-text); background: var(--c-border-hairline); }

.btn-secondary {
  background: var(--c-border);
  color: var(--c-text);
}
.btn-secondary:hover { background: #D1D5DB; }

/* ========== Continue Modal ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.2s var(--ease-out);
}

.modal {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 28px 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 0.25s var(--ease-out);
}

.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--c-text-secondary); margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }
.modal-actions .btn { flex: 1; padding: 12px 20px; font-size: 14px; min-height: 44px; }

/* ========== Question Page ========== */
.page-content--quiz {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.question-stage {
  position: relative;
  overflow: hidden;
  flex: 1;
  width: 100%;
  min-height: min(68vh, 640px);
  touch-action: pan-y;
}

.question-wrap {
  display: flex;
  flex-direction: column;
  width: 100%;
  backface-visibility: hidden;
}

.question-type-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.tag-scenario { background: #EDE9FE; color: #5B21B6; }
.tag-preference { background: #DBEAFE; color: #1D4ED8; }
.tag-tech { background: #D1FAE5; color: #059669; }
.tag-social { background: #FEF3C7; color: #B45309; }

.question-text {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.7;
  margin-bottom: 20px;
  letter-spacing: 0.002em;
  max-height: 40vh;
  overflow-y: auto;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 14px 16px;
  background: var(--c-card);
  border: 2px solid var(--c-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  line-height: 1.55;
  color: var(--c-text);
  transition: all 0.15s var(--ease-out);
  font-family: var(--font-sans);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
}

.option-btn:active { transform: scale(0.98); }
.option-btn:hover:not(.option-selected):not(:disabled) {
  border-color: #C7D2FE;
  background: #F5F7FF;
}
.option-btn:focus-visible {
  outline: 2px solid var(--c-primary);
  outline-offset: 2px;
}

.option-selected {
  border-color: var(--c-primary);
  background: var(--c-primary-light);
  box-shadow: 0 0 0 1px var(--c-primary);
}

.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: var(--c-bg);
  font-size: 13px;
  font-weight: 700;
  color: var(--c-text-secondary);
  transition: all 0.15s;
}
.option-selected .option-letter {
  background: var(--c-primary);
  color: #fff;
}

.option-text { flex: 1; padding-top: 3px; }

/* ========== Slide Transitions（前进：旧题左出、新题从右入）========== */
.slide-left-enter-active,
.slide-left-leave-active,
.slide-right-enter-active,
.slide-right-leave-active {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  width: 100%;
  transition: transform var(--slide-duration) var(--ease-slide);
  will-change: transform;
}

.slide-left-leave-active,
.slide-right-leave-active {
  z-index: 1;
}

.slide-left-enter-active,
.slide-right-enter-active {
  z-index: 2;
}

/* 下一题：整体向左滑 */
.slide-left-enter-from {
  transform: translate3d(100%, 0, 0);
}
.slide-left-enter-to {
  transform: translate3d(0, 0, 0);
}
.slide-left-leave-from {
  transform: translate3d(0, 0, 0);
}
.slide-left-leave-to {
  transform: translate3d(-100%, 0, 0);
}

/* 上一题：整体向右滑 */
.slide-right-enter-from {
  transform: translate3d(-100%, 0, 0);
}
.slide-right-enter-to {
  transform: translate3d(0, 0, 0);
}
.slide-right-leave-from {
  transform: translate3d(0, 0, 0);
}
.slide-right-leave-to {
  transform: translate3d(100%, 0, 0);
}

/* ========== Fade Transitions ========== */
.fade-enter-active { transition: opacity 0.4s var(--ease-out); }
.fade-leave-active { transition: opacity 0.2s var(--ease-out); }
.fade-enter-from, .fade-leave-to { opacity: 0; }

/* ========== Result Page ========== */
.result-wrap {
  animation: fadeInUp 0.55s var(--ease-out);
  padding: max(12px, env(safe-area-inset-top, 0px)) 0 max(16px, env(safe-area-inset-bottom, 0px)) 0;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 130% 55% at 50% -8%, rgba(79, 70, 229, 0.14), transparent 58%),
    radial-gradient(ellipse 70% 35% at 100% 12%, rgba(16, 185, 129, 0.07), transparent 50%),
    var(--c-bg);
}

.result-capture {
  background: var(--c-bg);
  padding: 0 16px;
}

/* Hero */
.result-hero {
  position: relative;
  text-align: center;
  padding: 28px 20px 24px;
  margin-bottom: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg, #ffffff 0%, #f8f7ff 48%, #f0fdf9 100%);
  border: 1px solid rgba(79, 70, 229, 0.08);
  box-shadow: 0 12px 40px rgba(79, 70, 229, 0.08), 0 1px 0 rgba(255, 255, 255, 0.8) inset;
  overflow: hidden;
}

.result-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 85% 15%, rgba(16, 185, 129, 0.12), transparent 42%);
  pointer-events: none;
}

.result-hero-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-primary);
  background: var(--c-primary-light);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 14px;
  position: relative;
}

.result-hero h2 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 6px;
  position: relative;
}

.result-hero-sub {
  font-size: 14px;
  color: var(--c-text-secondary);
  margin-bottom: 18px;
  position: relative;
}

.result-hero-highlight {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px 18px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(16, 185, 129, 0.2);
  box-shadow: 0 4px 16px rgba(16, 185, 129, 0.1);
  position: relative;
}

.result-hero-highlight-label {
  font-size: 11px;
  font-weight: 700;
  color: #059669;
  letter-spacing: 0.04em;
}

.result-hero-highlight-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--c-text);
  max-width: 200px;
  text-align: left;
  line-height: 1.3;
}

.result-hero-highlight-pct {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 22px;
  font-weight: 800;
  color: var(--c-success);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

/* Section blocks */
.result-block {
  background: var(--c-card);
  border-radius: 18px;
  padding: 20px 18px;
  margin-bottom: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 4px 24px rgba(17, 24, 39, 0.04);
  overflow: hidden;
}

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--c-text-secondary);
  margin-bottom: 16px;
  text-transform: uppercase;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--c-primary), #818cf8);
  flex-shrink: 0;
}

/* Radar */
.radar-container {
  padding: 8px 4px 4px;
  margin-bottom: 0;
  background: transparent;
  box-shadow: none;
  border: none;
  overflow: hidden;
  max-width: 100%;
}

.radar-container canvas {
  max-height: 300px;
  max-width: 100%;
  margin: 0 auto;
  display: block;
}

/* Dimension scores */
.scores-section { padding-bottom: 18px; }

.score-list { display: flex; flex-direction: column; gap: 14px; }

.score-row {
  opacity: 0;
  transform: translateY(10px);
  animation: scoreReveal 0.55s var(--ease-out) forwards;
}

.result-capture.scores-revealed .score-row,
.result-capture.is-capturing .score-row {
  opacity: 1 !important;
  transform: translateY(0) !important;
  animation: none !important;
}

.result-capture.is-capturing .score-bar-fill,
.result-capture.is-capturing .dir-bar-fill {
  transition: none !important;
}

.score-row-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.score-dim-tag {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--c-primary);
  background: var(--c-primary-light);
  padding: 3px 7px;
  border-radius: 6px;
  min-width: 52px;
  text-align: center;
}

.score-label {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  min-width: 0;
}

.score-value-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.score-value {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 17px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.score-value.is-top { color: #b45309; }

.score-top-badge {
  font-size: 10px;
  font-weight: 700;
  color: #b45309;
  background: var(--c-warning-light);
  padding: 2px 6px;
  border-radius: 6px;
}

.score-bar-bg {
  height: 10px;
  background: #eef0f4;
  border-radius: 999px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 1s var(--ease-out);
}

.score-bar-fill.primary {
  background: linear-gradient(90deg, #6366f1, var(--c-primary));
}

.score-bar-fill.gold {
  background: linear-gradient(90deg, #fbbf24, #f59e0b);
}

/* Direction */
.direction-section { background: transparent; border: none; box-shadow: none; padding: 0; }

.direction-list { display: flex; flex-direction: column; gap: 10px; }

.direction-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto auto;
  align-items: center;
  gap: 8px 12px;
  padding: 14px 16px;
  background: var(--c-card);
  border-radius: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 2px 12px rgba(17, 24, 39, 0.04);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
}

.direction-card.top-match {
  grid-template-columns: auto 1fr auto;
  padding: 18px 18px 16px;
  border: 1px solid rgba(16, 185, 129, 0.25);
  background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 55%);
  box-shadow: 0 8px 28px rgba(16, 185, 129, 0.12);
}

.dir-rank {
  grid-row: 1 / 3;
  width: 36px;
  height: 36px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 14px;
  font-weight: 800;
}

.dir-rank.top {
  background: linear-gradient(135deg, #34d399, var(--c-success));
  color: #fff;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
}

.dir-rank.normal {
  background: #f3f4f6;
  color: var(--c-text-secondary);
}

.dir-meta { min-width: 0; }

.dir-name {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--c-text);
  line-height: 1.35;
  margin-bottom: 8px;
}

.direction-card.top-match .dir-name {
  font-size: 15px;
}

.dir-bar-wrap {
  height: 8px;
  background: #eef0f4;
  border-radius: 999px;
  overflow: hidden;
}

.dir-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 1s var(--ease-out);
}

.dir-bar-fill.top { background: linear-gradient(90deg, #34d399, var(--c-success)); }
.dir-bar-fill.high { background: linear-gradient(90deg, #818cf8, var(--c-primary)); }
.dir-bar-fill.mid { background: linear-gradient(90deg, #fcd34d, var(--c-warning)); }
.dir-bar-fill.low { background: linear-gradient(90deg, #fca5a5, var(--c-danger)); }

.dir-pct-col {
  text-align: right;
  grid-row: 1 / 3;
  align-self: center;
}

.dir-pct {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 18px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--c-text);
  line-height: 1;
}

.direction-card.top-match .dir-pct {
  font-size: 26px;

.dir-badge {

.dir-badge.best {
  background: var(--c-success-light);
  color: #047857;
}

.insight-card {
  display: flex;
  gap: 14px;
  padding: 18px 16px;
  margin-bottom: 12px;
  background: var(--c-card);
  border-radius: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 2px 16px rgba(17, 24, 39, 0.04);
}

.insight-card:last-of-type { margin-bottom: 0; }

.insight-card-accent {
  width: 4px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: stretch;
}

.insight-card--match .insight-card-accent { background: linear-gradient(180deg, var(--c-primary), #818cf8); }
.insight-card--warn .insight-card-accent { background: linear-gradient(180deg, var(--c-warning), #fbbf24); }
.insight-card--tip .insight-card-accent { background: linear-gradient(180deg, var(--c-success), #34d399); }

.insight-card-body { min-width: 0; flex: 1; }

.insight-card-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.insight-card--match .insight-card-tag { color: var(--c-primary); }
.insight-card--warn .insight-card-tag { color: #b45309; }
.insight-card--tip .insight-card-tag { color: #059669; }

.insight-card h3 {

  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 8px;
  color: var(--c-text);
}

.insight-card p {
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--c-text-secondary);
}

.insights-section { margin-bottom: 16px; }

/* Quote */
.heuristic-footer {
  margin: 20px 0 8px;
  padding: 22px 20px;
  text-align: center;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(79, 70, 229, 0.06), rgba(16, 185, 129, 0.05));
  border: 1px dashed rgba(79, 70, 229, 0.15);
  position: relative;
}

.heuristic-footer::before {
  content: '\201C';
  position: absolute;
  top: 8px;
  left: 16px;
  font-size: 36px;
  line-height: 1;
  color: rgba(79, 70, 229, 0.2);
  font-family: Georgia, serif;
}

.heuristic-footer p {
  font-size: 14px;
  font-style: normal;
  font-weight: 500;
  color: var(--c-text);
  line-height: 1.85;
  position: relative;
  white-space: pre-line;
}

/* Disclaimer */
.disclaimer {
  margin-top: 32px;
  padding: 16px;
  background: #F9FAFB;
  border-radius: var(--radius-sm);
}
.disclaimer-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--c-text-secondary);
  margin-bottom: 8px;
}
.disclaimer ol {

  font-size: 11.5px;
  color: var(--c-text-light);
  line-height: 1.7;
}
.disclaimer ol li { margin-bottom: 3px; }

/* ========== Result actions & save modal ========== */
.result-actions-bar {
  position: sticky;
  bottom: 0;
  z-index: 20;
  margin: 0 -4px;
  padding: 16px 4px max(12px, env(safe-area-inset-bottom, 0px));

}

.result-actions {
  display: flex;
  gap: 10px;
}

.result-actions .btn {
  flex: 1;
  min-height: 50px;
  font-size: 14px;
  border-radius: 14px;
}

.result-actions .btn-primary {
  box-shadow: 0 6px 20px rgba(79, 70, 229, 0.28);
}

.btn-outline-primary {
  background: var(--c-card);

  border: 2px solid var(--c-primary);
  box-shadow: none;
}
.btn-outline-primary:hover:not(:disabled) {

}

}

.modal-save {
  max-width: 400px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 20px 18px 18px;
}

.modal-save h2 {
  font-size: 17px;
  margin-bottom: 12px;

}

.save-preview-wrap {

.modal-save .modal-actions {

/* ========== Keyframe Animations ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes scoreReveal {

<script>
function loadScriptSequential(urls) {
  return new Promise(function(resolve, reject) {
    var i = 0;
    function next() {
      if (i >= urls.length) {
        reject(new Error('script load failed: ' + urls[0]));
        return;
      }
      var s = document.createElement('script');
      s.src = urls[i++];
      s.async = false;
      s.onload = function() { resolve(); };
      s.onerror = function() { next(); };
      document.head.appendChild(s);
    }
    next();
  });
}

function showLoadError(msg) {

  }
}

  ], dims:{TECH:[5,'B'],JUDGE:[4,'B']}},
  { id:4, category:'social', text:'评审会上研发说「这需求做不了」，但业务很重要。你会？', text_en:'In a review meeting, engineering says "this can\'t be built," but it\'s critical for the business. You:', options:[
    {letter:'A', text:'接受研发判断，做不了就算了'},
    {letter:'B', text:'会后单独聊清不可能还是成本高'},
    {letter:'C', text:'坚持要做，让研发技术上克服'},
    {letter:'D', text:'回去让业务方降低预期'},
    {letter:'E', text:'拉上研发leader一起调方案排期'}
  ], options_en:[
    {letter:'A', text:'Accept engineering\'s verdict—if it can\'t be done, so be it'},
    {letter:'B', text:'Follow up one-on-one: is it truly impossible, or just expensive?'},
    {letter:'C', text:'Insist on building it; tell engineering to figure out the tech'},
    {letter:'D', text:'Go back and lower the business stakeholder\'s expectations'},
    {letter:'E', text:'Pull in the engineering lead to jointly re-scope and re-schedule'}
  ], dims:{COMM:[5,'B'],JUDGE:[3,'B']}},
  { id:5, category:'scenario', text:'设计电商退款流程，哪种思考最接近你？', text_en:'When designing an e-commerce refund flow, which approach is closest to yours?', options:[
    {letter:'A', text:'画全流程图，标每步异常与规则'},
    {letter:'B', text:'参考淘宝京东，竞品流程直接套'},
    {letter:'C', text:'先问客服退款最常见痛点'},
    {letter:'D', text:'先做最简版，上线后快速迭代'},
    {letter:'E', text:'先写详尽需求，枚举所有边界'}
  ], options_en:[
    {letter:'A', text:'Map the full flow, annotate every exception and rule at each step'},
    {letter:'B', text:'Copy what Taobao/JD does—just adapt a competitor\'s flow'},
    {letter:'C', text:'First interview customer support about the most common refund pain points'},
    {letter:'D', text:'Ship the simplest version first, iterate rapidly post-launch'},
    {letter:'E', text:'Write exhaustive requirements, enumerating every edge case upfront'}
  ], dims:{LOGIC:[5,'A'],EMPATHY:[3,'C']}},
  { id:6, category:'preference', text:'过去一年，你主动学新技能的频率是？', text_en:'Over the past year, how often have you proactively learned new skills?', options:[
    {letter:'A', text:'几乎没有，太忙没精力'},
    {letter:'B', text:'偶尔被逼着学，不主动'},
    {letter:'C', text:'感兴趣会学，热度过了就放下'},
    {letter:'D', text:'常主动学新工具，大多能坚持掌握'},
    {letter:'E', text:'每天都在学，不学就焦虑'}
  ], options_en:[
    {letter:'A', text:'Almost never—too busy, no energy'},
    {letter:'B', text:'Occasionally, only when forced—not proactive'},
    {letter:'C', text:'I dive in when something interests me, but drop it when excitement fades'},
    {letter:'D', text:'I regularly pick up new tools and usually stick with them to mastery'},
    {letter:'E', text:'I learn something every day—I get anxious if I don\'t'}
  ], dims:{GRIT:[5,'D'],TECH:[3,'D']}},
  { id:7, category:'scenario', text:'竞品上了热议新功能，团队说「我们也做」。你会？', text_en:'A competitor launched a buzzy new feature. The team says "let\'s build it too." You:', options:[
    {letter:'A', text:'马上跟进，不然用户会流失'},
    {letter:'B', text:'先弄清用户需求与定位是否匹配'},
    {letter:'C', text:'不做，跟竞品没意思'},
    {letter:'D', text:'做比竞品更好的版本超越'},
    {letter:'E', text:'先灰度看用户反应再决定'}
  ], options_en:[
    {letter:'A', text:'Follow immediately—we\'ll lose users otherwise'},
    {letter:'B', text:'First clarify user needs and whether it aligns with our positioning'},
    {letter:'C', text:'Don\'t do it—copying competitors is pointless'},
    {letter:'D', text:'Build a better version and out-execute them'},
    {letter:'E', text:'A/B test a small cohort first, then decide based on data'}
  ], dims:{JUDGE:[5,'B'],TASTE:[3,'B'],EMPATHY:[2,'B']}},
  { id:8, category:'social', text:'项目折腾两月终于上线，数据一般，老板说效果不理想。你会？', text_en:'After two months of grind, your project goes live. Metrics are middling. Your boss says the results are disappointing. You:', options:[
    {letter:'A', text:'很委屈，不全是我一个人的问题'},
    {letter:'B', text:'先复盘原因，整理分析再汇报'},
    {letter:'C', text:'老板说得对，我下次努力'},
    {letter:'D', text:'有点麻木，起起伏伏正常'},
    {letter:'E', text:'怀疑自己不适合，想换方向'}
  ], options_en:[
    {letter:'A', text:'Feel unfairly blamed—it wasn\'t just my fault'},
    {letter:'B', text:'Run a post-mortem first, organize findings, then report back'},
    {letter:'C', text:'The boss is right; I\'ll try harder next time'},
    {letter:'D', text:'Feel numb—ups and downs are normal'},
    {letter:'E', text:'Start doubting myself and thinking about switching direction'}
  ], dims:{GRIT:[5,'B'],COMM:[3,'B'],JUDGE:[3,'B']}},
  { id:9, category:'tech', text:'哪项最符合你对AI的真实理解程度？', text_en:'Which best describes your actual understanding of AI?', options:[
    {letter:'A', text:'常用ChatGPT/豆包，不懂原理'},
    {letter:'B', text:'懂预测下一词、幻觉与Prompt影响'},
    {letter:'C', text:'懂Prompt与RAG，知何时微调'},
    {letter:'D', text:'懂Agent机制，能判断是否适用'},
    {letter:'E', text:'都不太符合，主要靠新闻了解'}
  ], options_en:[
    {letter:'A', text:'I use ChatGPT/Claude regularly but don\'t understand the principles'},
    {letter:'B', text:'I understand next-token prediction, hallucinations, and how prompts affect output'},
    {letter:'C', text:'I understand prompts, RAG, and know when fine-tuning makes sense'},
    {letter:'D', text:'I understand agent architectures and can judge when AI is appropriate'},
    {letter:'E', text:'None really fit—I mostly learn about AI through news headlines'}
  ], dims:{TECH:[5,'D'],LOGIC:[2,'D']}},
  { id:10, category:'preference', text:'看到用户反馈「产品太难用」，你会？', text_en:'You see user feedback saying "this product is too hard to use." You:', options:[
    {letter:'A', text:'觉得用户不会用，产品挺好'},
    {letter:'B', text:'找到用户，问清难点并看操作'},
    {letter:'C', text:'看有多少类似反馈，少数当个例'},
    {letter:'D', text:'自己走一遍流程找卡点'},
    {letter:'E', text:'转给产品/运营同事处理'}
  ], options_en:[
    {letter:'A', text:'Think the user just doesn\'t know how to use it—the product is fine'},
    {letter:'B', text:'Reach out to the user, ask about their pain points, and watch them use it'},
    {letter:'C', text:'Check how many similar complaints there are; treat isolated cases as anecdotes'},
    {letter:'D', text:'Walk through the flow myself to find friction points'},
    {letter:'E', text:'Forward it to the product/ops team to handle'}
  ], dims:{EMPATHY:[5,'B'],TASTE:[3,'B']}},
  { id:11, category:'scenario', text:'新功能首周使用率不到预估两成，有人要等有人要下。你会？', text_en:'A new feature\'s first-week usage is under 20% of projections. Some say wait, some say kill it. You:', options:[
    {letter:'A', text:'多等两周，等新功能冷启动'},
    {letter:'B', text:'分析是入口、流失还是不知晓'},
    {letter:'C', text:'立刻下线，方向肯定错了'},
    {letter:'D', text:'加大运营推送把数据拉起来'},
    {letter:'E', text:'找用户访谈后再判断'}
  ], options_en:[
    {letter:'A', text:'Wait a couple more weeks—new features need time for cold start'},
    {letter:'B', text:'Diagnose: is it discoverability, drop-off, or awareness?'},
    {letter:'C', text:'Kill it immediately—the direction must be wrong'},
    {letter:'D', text:'Boost it with aggressive push notifications and marketing'},
    {letter:'E', text:'Interview users first, then decide'}
  ], dims:{JUDGE:[5,'B'],LOGIC:[3,'B']}},
  { id:12, category:'preference', text:'刷社交媒体/看资讯时，哪种最接近你？', text_en:'When browsing social media or news, which best describes you?', options:[
    {letter:'A', text:'主要看娱乐，很少看行业内容'},
    {letter:'B', text:'看到行业文会点，但不刻意搜'},
    {letter:'C', text:'关注博主，定期看并收藏观点'},
    {letter:'D', text:'有RSS/信源体系，每天固定处理'},
    {letter:'E', text:'除工作外几乎不看，多是噪音'}
  ], options_en:[
    {letter:'A', text:'Mostly entertainment—I rarely read industry content'},
    {letter:'B', text:'I\'ll click industry articles if I see them, but don\'t actively seek them out'},
    {letter:'C', text:'I follow thought leaders, read and bookmark regularly'},
    {letter:'D', text:'I have a RSS/info-source system and process it daily'},
    {letter:'E', text:'I barely look outside work—most of it is noise'}
  ], dims:{GRIT:[4,'D'],TASTE:[3,'C']}},
  { id:13, category:'tech', text:'AI客服要答「订单到哪了」，需查物流。哪种方案最合理？', text_en:'An AI customer service bot needs to answer "Where\'s my order?" and look up shipping. Which approach makes the most sense?', options:[
    {letter:'A', text:'物流文档喂RAG，从文档找答案'},
    {letter:'B', text:'函数调用物流API再生成回答'},
    {letter:'C', text:'订单全塞进Prompt让AI找'},
    {letter:'D', text:'不管物流，生成通用配送话术'},
    {letter:'E', text:'不清楚区别，交给技术决定'}
  ], options_en:[
    {letter:'A', text:'Feed logistics docs into RAG, let it find answers from documentation'},
    {letter:'B', text:'Use function calling to query the logistics API, then generate the response'},
    {letter:'C', text:'Stuff all orders into the prompt and let AI find the right one'},
    {letter:'D', text:'Ignore actual logistics—generate a generic shipping status message'},
    {letter:'E', text:'Not sure about the differences; leave it to engineering'}
  ], dims:{TECH:[5,'B'],JUDGE:[4,'B']}},
  { id:14, category:'social', text:'评审会上设计负责人说交互不合理。你会？', text_en:'In a design review, the design lead says the interaction is unreasonable. You:', options:[
    {letter:'A', text:'尴尬但听完，有理接受无理私聊'},
    {letter:'B', text:'立刻反驳，说有用户调研依据'},
    {letter:'C', text:'很挫败，觉得自己设计不行'},
    {letter:'D', text:'问哪里不合理，讨论怎么改'},
    {letter:'E', text:'会后找用户测两方案用数据说话'}
  ], options_en:[
    {letter:'A', text:'Feel awkward but listen; accept if valid, discuss privately if not'},
    {letter:'B', text:'Push back immediately—I have user research to back it up'},
    {letter:'C', text:'Feel crushed—maybe my design skills aren\'t good enough'},
    {letter:'D', text:'Ask what\'s unreasonable and discuss how to improve it'},
    {letter:'E', text:'Test both approaches with users afterwards and let data settle it'}
  ], dims:{COMM:[5,'D'],TASTE:[3,'D']}},
  { id:15, category:'scenario', text:'访谈中有人要一键完成，有人要步步看清。你会？', text_en:'In user interviews, some want one-click completion; others want step-by-step clarity. You:', options:[
    {letter:'A', text:'听多数人，哪个多按哪个'},
    {letter:'B', text:'关键步骤慢确认，非关键快完成'},
    {letter:'C', text:'优先安全感，听步步看清的'},
    {letter:'D', text:'优先效率，听一键完成的'},
    {letter:'E', text:'做快速/安全两种模式可选'}
  ], options_en:[
    {letter:'A', text:'Follow the majority—whichever has more votes wins'},
    {letter:'B', text:'Slow confirmation for critical steps, fast completion for non-critical ones'},
    {letter:'C', text:'Prioritize safety—go with the step-by-step users'},
    {letter:'D', text:'Prioritize efficiency—go with the one-click users'},
    {letter:'E', text:'Build two modes: fast and guided, let users choose'}
  ], dims:{EMPATHY:[5,'B'],JUDGE:[4,'B']}},
  { id:16, category:'preference', text:'工作之外，你最喜欢做什么？', text_en:'Outside of work, what do you enjoy most?', options:[
    {letter:'A', text:'打游戏追剧刷短视频休息'},
    {letter:'B', text:'聚会聊天，和人连接充电'},
    {letter:'C', text:'看书学技能，喂饱好奇心'},
    {letter:'D', text:'运动徒步户外，重启大脑'},
    {letter:'E', text:'捣鼓副业小项目，创造快乐'}
  ], options_en:[
    {letter:'A', text:'Gaming, binge-watching shows, scrolling short videos—pure relaxation'},
    {letter:'B', text:'Socializing, catching up with friends—I recharge through connection'},
    {letter:'C', text:'Reading and learning new skills—feeding my curiosity'},
    {letter:'D', text:'Exercise, hiking, outdoors—resetting my brain'},
    {letter:'E', text:'Tinkering with side projects—I find joy in creating'}
  ], dims:{GRIT:[3,'C'],EMPATHY:[4,'B']}},
  { id:17, category:'scenario', text:'内部看板：BI两天上线或自研两周，仅3人用。你选？', text_en:'Internal dashboard: BI tool delivers in 2 days, custom build takes 2 weeks. Only 3 users. You choose:', options:[
    {letter:'A', text:'先BI两天上线，验证后再说'},
    {letter:'B', text:'自研灵活度是长期竞争力'},
    {letter:'C', text:'先不做，需求更明确再说'},
    {letter:'D', text:'两方案并行，A先顶B同步'},
    {letter:'E', text:'问研发BI能否折中改造'}
  ], options_en:[
    {letter:'A', text:'BI tool in 2 days—validate first, decide later'},
    {letter:'B', text:'Custom build—flexibility is a long-term competitive advantage'},
    {letter:'C', text:'Hold off—wait until requirements are clearer'},
    {letter:'D', text:'Run both in parallel: BI ships now, custom build in background'},
    {letter:'E', text:'Ask engineering if we can customize the BI tool as a middle ground'}
  ], dims:{LOGIC:[5,'A'],TECH:[3,'A']}},
  { id:18, category:'social', text:'推跨运营/研发/法务项目，三方都说忙或排不进。你会？', text_en:'You\'re driving a cross-functional project (ops, engineering, legal). All three say they\'re too busy. You:', options:[
    {letter:'A', text:'逐个聊清卡点，必要时找leader'},
    {letter:'B', text:'邮件抄送各方与leader定deadline'},
    {letter:'C', text:'先做不需配合的部分'},
    {letter:'D', text:'找自己老板出面推'},
    {letter:'E', text:'暂时搁置，等条件成熟'}
  ], options_en:[
    {letter:'A', text:'Talk to each one to understand blockers; escalate to leads if needed'},
    {letter:'B', text:'Send an email CC\'ing all parties and their leads with a hard deadline'},
    {letter:'C', text:'Start on the parts that don\'t require their input'},
    {letter:'D', text:'Ask my own boss to push it forward'},
    {letter:'E', text:'Pause it temporarily—wait for conditions to improve'}
  ], dims:{COMM:[5,'A'],GRIT:[2,'A']}},
  { id:19, category:'tech', text:'AI写文案不符合品牌调性，哪种解决思路最接近你？', text_en:'AI-generated copy doesn\'t match the brand tone. Which fix is closest to your thinking?', options:[
    {letter:'A', text:'加提示「仅供参考请人工审核」'},
    {letter:'B', text:'分析bad case写进Prompt并建评测集'},
    {letter:'C', text:'不做AI文案，改回人工'},
    {letter:'D', text:'换更强模型，能力上来就好'},
    {letter:'E', text:'让用户先选正式/轻松等调性'}
  ], options_en:[
    {letter:'A', text:'Add a disclaimer: "For reference only—please review manually"'},
    {letter:'B', text:'Analyze bad cases, refine the prompt, and build an evaluation benchmark'},
    {letter:'C', text:'Drop AI copywriting—go back to human writers'},
    {letter:'D', text:'Switch to a more powerful model—better capability will fix it'},
    {letter:'E', text:'Let users pre-select a tone: formal, casual, etc.'}
  ], dims:{TECH:[5,'B'],GRIT:[3,'B']}},
  { id:20, category:'scenario', text:'本期无法交付全部规划功能，你的本能反应是？', text_en:'You can\'t deliver all planned features this cycle. Your instinctive response:', options:[
    {letter:'A', text:'按重要紧急矩阵砍，保核心质量'},
    {letter:'B', text:'跟研发商量加人或加班全交付'},
    {letter:'C', text:'让业务方定优先级'},
    {letter:'D', text:'砍掉爽但用户价值小的功能'},
    {letter:'E', text:'每项都砍到最小可用版'}
  ], options_en:[
    {letter:'A', text:'Use an importance/urgency matrix to cut scope, protect core quality'},
    {letter:'B', text:'Negotiate with engineering for more headcount or overtime to deliver all'},
    {letter:'C', text:'Let the business stakeholders decide priorities'},
    {letter:'D', text:'Cut features that feel nice but deliver low user value'},
    {letter:'E', text:'Trim every item down to its minimum viable version'}
  ], dims:{JUDGE:[6,'A'],LOGIC:[4,'A']}},
  { id:21, category:'preference', text:'做完一个项目或功能后，你通常会？', text_en:'After finishing a project or feature, you usually:', options:[
    {letter:'A', text:'松口气赶紧下一个，不复盘'},
    {letter:'B', text:'心里过一遍得失，很少写下来'},
    {letter:'C', text:'写复盘文档并分享给团队'},
    {letter:'D', text:'主要复盘别人，自己没啥好复'},
    {letter:'E', text:'不想回头看，向前看更重要'}
  ], options_en:[
    {letter:'A', text:'Breathe a sigh of relief and jump to the next one—no retro'},
    {letter:'B', text:'Mentally review wins and losses, but rarely write it down'},
    {letter:'C', text:'Write a post-mortem doc and share it with the team'},
    {letter:'D', text:'Mostly retro other people\'s work—nothing much to reflect on myself'},
    {letter:'E', text:'Don\'t want to look back—forward is more important'}
  ], dims:{GRIT:[4,'C'],LOGIC:[3,'C']}},
  { id:22, category:'scenario', text:'下班前支付状态bug影响0.1%用户，修要4小时；新功能测试未确认。你会？', text_en:'End of day: a payment status bug affects 0.1% of users, fix takes 4hrs. New feature QA is unconfirmed. You:', options:[
    {letter:'A', text:'先修bug，支付问题恐慌大于损失'},
    {letter:'B', text:'按原计划上线新功能，bug用FAQ安抚'},
    {letter:'C', text:'研发修bug，我确认新功能测试'},
    {letter:'D', text:'发公告说状态延迟，先推新功能'},
    {letter:'E', text:'问客服投诉多吗，不多先不管'}
  ], options_en:[
    {letter:'A', text:'Fix the bug first—payment issues cause panic beyond the monetary loss'},
    {letter:'B', text:'Launch the new feature as planned; handle the bug with a FAQ page'},
    {letter:'C', text:'Engineering fixes the bug while I finish QA on the new feature'},
    {letter:'D', text:'Post an announcement about status delays; push the new feature first'},
    {letter:'E', text:'Check with support: if complaints are low, deprioritize it'}
  ], dims:{JUDGE:[5,'A'],COMM:[2,'A']}},
  { id:23, category:'social', text:'leader方向很坚持，你直觉有问题且数据部分支持。你会？', text_en:'Your lead is adamant about a direction. Your gut says it\'s problematic & data partially backs you. You:', options:[
    {letter:'A', text:'听leader的，他经验更丰富'},
    {letter:'B', text:'先做最小版用真实数据说话'},
    {letter:'C', text:'整理分析文档约leader单独聊'},
    {letter:'D', text:'私下吐槽，会上照他说的做'},
    {letter:'E', text:'会上直接提出不同意见'}
  ], options_en:[
    {letter:'A', text:'Follow the lead—they have more experience'},
    {letter:'B', text:'Build a min-viable version first and let real data speak'},
    {letter:'C', text:'Prepare an analysis doc and schedule a 1:1 with the lead'},
    {letter:'D', text:'Vent privately but do what the lead says in meetings'},
    {letter:'E', text:'Voice my disagreement openly in the meeting'}
  ], dims:{COMM:[4,'C'],JUDGE:[4,'C']}},
  { id:24, category:'tech', text:'想了解一项新AI技术时，你通常会？', text_en:'When you want to understand a new AI technology, you usually:', options:[
    {letter:'A', text:'看几篇公众号了解概念就够'},
    {letter:'B', text:'看文章视频，感兴趣就注册试试'},
    {letter:'C', text:'自己试并想能否解决工作问题做Demo'},
    {letter:'D', text:'除非工作要求，不主动研究'},
    {letter:'E', text:'工作中已深度用AI工具持续关注'}
  ], options_en:[
    {letter:'A', text:'Read a few blog posts to grasp the concept—that\'s enough'},
    {letter:'B', text:'Watch videos & read articles; sign up and try it if interested'},
    {letter:'C', text:'Try it hands-on and think about whether it can solve a real work problem—build a demo'},
    {letter:'D', text:'Unless work requires it, I don\'t proactively research'},
    {letter:'E', text:'I\'m already deeply using AI tools at work and continuously tracking the space'}
  ], dims:{TECH:[5,'C'],GRIT:[4,'C']}},
  { id:25, category:'scenario', text:'自认刚需的功能上线两周，仅零星使用。你首先会？', text_en:'A feature you were sure was essential went live two weeks ago—barely any usage. Your first move:', options:[
    {letter:'A', text:'再等等，好功能需时间被发现'},
    {letter:'B', text:'用数据看入口、点击、完成断点'},
    {letter:'C', text:'怀疑需求不存在，考虑下线'},
    {letter:'D', text:'加大引导弹窗红点让用户注意'},
    {letter:'E', text:'找用户当面操作，只观察不说'}
  ], options_en:[
    {letter:'A', text:'Wait a bit longer—good features take time to be discovered'},
    {letter:'B', text:'Check data: entry points, clicks, and completion drop-off'},
    {letter:'C', text:'Doubt the need is real; consider killing the feature'},
    {letter:'D', text:'Add more onboarding tooltips and red badges to draw attention'},
    {letter:'E', text:'Watch real users interact with it in person—observe, don\'t interrupt'}
  ], dims:{EMPATHY:[5,'B'],JUDGE:[4,'B']}},
  { id:26, category:'preference', text:'哪种说法最接近你对数据的态度？', text_en:'Which statement best matches your attitude toward data?', options:[
    {letter:'A', text:'信数据，数据说什么就是什么'},
    {letter:'B', text:'数据重要但会骗人，结合直觉判断'},
    {letter:'C', text:'不擅分析，依赖分析师结论'},
    {letter:'D', text:'数据用来证明自己是对的'},
    {letter:'E', text:'数据常不够准，更信访谈观察'}
  ], options_en:[
    {letter:'A', text:'I trust data—whatever the numbers say, that\'s the truth'},
    {letter:'B', text:'Data is important but can lie; I combine it with intuition'},
    {letter:'C', text:'I\'m not great at analysis; I rely on analysts\' conclusions'},

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i];
    a[i] = a[j];
    a[j] = t;
  }
  return a;
}

    },
    currentQuestionOptions() {
      return this.lang === 'en' && this.currentQuestion.options_en ? this.currentQuestion.options_en : this.currentQuestion.options;
    },
    answeredCount() { return Object.keys(this.selectedAnswers).length; },
    progressPct() { return (this.answeredCount / QUESTIONS.length) * 100; },
    categoryLabels() {
      return this.lang === 'zh'
        ? { scenario:'情景判断', preference:'偏好与习惯', tech:'技术认知', social:'人际互动' }
        : { scenario:'Scenario', preference:'Preference & Habit', tech:'Tech Awareness', social:'Social Dynamics' };
    },

    // Calculate raw dimension scores (0-100)
    dimensionScores() {
      const scores = { JUDGE:0, LOGIC:0, EMPATHY:0, TASTE:0, TECH:0, COMM:0, GRIT:0 };
      const counts = { JUDGE:0, LOGIC:0, EMPATHY:0, TASTE:0, TECH:0, COMM:0, GRIT:0 };

      QUESTIONS.forEach((q) => {
        const answer = this.selectedAnswers[q.id];
        if (answer === null || answer === undefined) return;
        const dims = q.dims;
        Object.entries(dims).forEach(([dim, [weight, bestAnswer]]) => {
          if (answer === bestAnswer) {
            scores[dim] += weight;
          }
          counts[dim] += weight;
        });
      });

      // Normalize to 0-100
      const norm = {};
      Object.keys(scores).forEach(dim => {
        norm[dim] = counts[dim] > 0 ? Math.round((scores[dim] / counts[dim]) * 100) : 50;
      });
      return norm;
    },

    dimensionScoresDisplay() {
      const scores = this.dimensionScores;
      const dims = ['JUDGE','LOGIC','EMPATHY','TASTE','TECH','COMM','GRIT'];
      const maxScore = Math.max(...dims.map(d => scores[d]));
      return dims.map(key => ({
        key, label: this.lang === 'zh' ? DIMENSION_NAMES[key] : DIMENSION_NAMES_EN[key], score: scores[key], isTop: scores[key] === maxScore
      }));
    },

    directionResults() {
      const scores = this.dimensionScores;
      const names = this.lang === 'zh' ? DIRECTION_NAMES : DIRECTION_NAMES_EN;
      const results = [];
      Object.entries(WEIGHT_MATRIX).forEach(([dir, weights]) => {
        let total = 0, wSum = 0;
        Object.entries(weights).forEach(([dim, w]) => {
          total += (scores[dim] || 50) * w;
          wSum += w;
        });
        const pct = wSum > 0 ? Math.round(total / wSum) : 50;
        results.push({ key: dir, label: names[dir], pct });
      });
      results.sort((a, b) => b.pct - a.pct);
      return results.map((r, i) => ({
        ...r,
        barClass: i === 0 ? 'top' : r.pct >= 80 ? 'high' : r.pct >= 65 ? 'mid' : 'low'
      }));
    },

    analysisText() {
      const dirs = this.directionResults;
      const dims = this.dimensionScoresDisplay;
      const topDim = dims.find(d => d.isTop) || dims[0];
      const bottomDim = [...dims].sort((a,b) => a.score - b.score)[0];
      const topDir = dirs[0];
      const bottomDir = dirs[4];
      const variance = this.calcVariance(dims.map(d => d.score));

      const topMatch = this.getTopMatchAnalysis(topDir, topDim);
      const bottomMatch = this.getBottomMatchAnalysis(bottomDir, bottomDim);
      const general = this.getGeneralAnalysis(dims, variance);

      return { topMatch, bottomMatch, general };
    }
  },
  methods: {
    t(key) {
      var keys = key.split('.');
      var val = T[this.lang];
      for (var i = 0; i < keys.length; i++) {
        if (val == null) return key;
        val = val[keys[i]];
      }
      return val != null ? val : key;
    },

    applyPageLang() {
      document.title = this.t('pageTitle');
      document.documentElement.lang = this.lang === 'zh' ? 'zh-CN' : 'en';
    },

    toggleLang() {
      this.lang = this.lang === 'zh' ? 'en' : 'zh';
      try { localStorage.setItem(STORAGE_LANG_KEY, this.lang); } catch(e) {}

      if (this.appState === 'result' && this.radarChart) {
        this.$nextTick(function() { this.initRadarChart(); }.bind(this));
      }
    },

    calcVariance(scores) {
      const mean = scores.reduce((a,b) => a+b, 0) / scores.length;
      return scores.reduce((a,b) => a + Math.pow(b-mean,2), 0) / scores.length;
    },

          : '在2026年依然保持对技术的敏锐学习和判断力，这本身就是一种稀缺能力。做AI产品，你不会被工程师"这个做不了"的说辞拦住，因为你大概知道能做不能做。但你的挑战可能是"技术兴奋度过高"，不是所有问题都需要AI来解决。');

          ? 'In 2026, a tech fluency gap will noticeably impact your competitiveness in AI-related directions. But you don\'t need to become an engineer—the key is building a basic mental framework of AI capability boundaries. Start with 15 minutes a day learning about one AI product feature, and accumulate intuition for what AI can and can\'t do.'

          : '用户洞察力的短板可能让你在需要深度理解用户的方向上感到吃力。这不一定意味着你缺乏同理心，而可能是你更习惯用逻辑而非直觉去理解问题。建议刻意练习"用户观察"：每月找2-3个真实用户，不要问问题，就静静地看他们怎么用产品。');

          : '你的能力画像非常均衡——没有明显的短板，但也没有绝对突出的长板。这意味着你是一个"即插即用"型选手，放在哪个方向都能快速上手。但也意味着你可能需要在某个维度上有意识地"刻意突出"，找到你真正热爱的方向，在那个方向的核心维度上持续深耕，让你的长板长到别人一眼就能认出来。');
      } else {

          : '你的能力画像有明显的长板和短板。你的' + top.label + '是你的核心竞争力，建议在职业选择中优先寻找能最大化发挥这个能力的场景。而' + bottom.label + '虽然目前是短板，但可以通过刻意练习来提升。关键是：不要为了补齐短板而牺牲长板的发挥空间——找到需要你长板的场景，短板用合作来补。');
      }
      return tpls.join(' ');
    },

    initQuestionOrder() {
      this.questionOrder = shuffleArray(QUESTIONS.map(function(_, i) { return i; }));
    },

    getFirstUnansweredIndex() {
      for (var i = 0; i < this.questionOrder.length; i++) {
        var q = QUESTIONS[this.questionOrder[i]];
        if (this.selectedAnswers[q.id] == null) return i;
      }
      return this.questionOrder.length;
    },

    migrateLegacyAnswers(parsed) {
      var keys = Object.keys(parsed);
      if (!keys.length) return parsed;
      var looksLegacy = keys.every(function(k) { return /^\d+$/.test(k) && parseInt(k, 10) < QUESTIONS.length; });
      if (!looksLegacy) return parsed;
      var next = {};
      keys.forEach(function(k) {
        var q = QUESTIONS[parseInt(k, 10)];
        if (q) next[q.id] = parsed[k];
      });
      return next;
    },

    startTest() {
      this.initQuestionOrder();
      this.selectedAnswers = {};
      this.currentQ = 0;
      this.optionLocked = false;
      this.slideDirection = 'slide-left';
      this.appState = 'quiz';
      this.saveProgress();
    },

    selectOption(letter) {
      if (this.optionLocked) return;

      var qid = this.currentQuestion.id;
      var hadAnswer = this.selectedAnswers[qid] != null;
      var sameAnswer = this.selectedAnswers[qid] === letter;

      this.selectedAnswers[qid] = letter;
      this.saveProgress();

      // 回退后：点已选选项 = 进入下一题；点其他选项 = 改答案后进入下一题
      if (hadAnswer) {
        var delay = sameAnswer ? 0 : 400;
        this.optionLocked = true;
        var self = this;
        setTimeout(function() {
          self.optionLocked = false;
          self.goNextQuestion();
        }, delay);
        return;
      }

      this.optionLocked = true;
      var self = this;
      setTimeout(function() {
        self.optionLocked = false;
        self.goNextQuestion();
      }, 500);
    },

    goNextQuestion() {
      if (this.answeredCount >= this.questions.length) {
        this.appState = 'result';
        this.$nextTick(function() { this.initResultPage(); }.bind(this));
        return;
      }
      if (this.currentQ < this.questions.length - 1) {
        this.slideDirection = 'slide-left';
        this.currentQ++;
      }
    },

    nextQuestion() {
      if (this.selectedAnswers[this.currentQuestion.id] == null) return;
      this.optionLocked = false;
      this.goNextQuestion();
    },

    prevQuestion() {
      if (this.currentQ > 0) {
        this.optionLocked = false;
        this.slideDirection = 'slide-right';
        this.currentQ--;
      }
    },

    saveProgress() {
      try {
        if (this.questionOrder.length) {
          localStorage.setItem(STORAGE_ORDER_KEY, JSON.stringify(this.questionOrder));
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this.selectedAnswers));
        localStorage.setItem(STORAGE_LANG_KEY, this.lang);
        var progress = this.questionOrder.length ? this.getFirstUnansweredIndex() : this.answeredCount;
        localStorage.setItem(STORAGE_PROGRESS_KEY, progress);
      } catch(e) {}
    },

    loadProgress() {
      try {
        var lang = localStorage.getItem(STORAGE_LANG_KEY);
        if (lang === 'zh' || lang === 'en') this.lang = lang;
        var data = localStorage.getItem(STORAGE_KEY);
        if (!data) return;
        this.selectedAnswers = this.migrateLegacyAnswers(JSON.parse(data));
        var orderData = localStorage.getItem(STORAGE_ORDER_KEY);
        if (orderData) {
          this.questionOrder = JSON.parse(orderData);
        } else if (Object.keys(this.selectedAnswers).length) {
          this.initQuestionOrder();
        }
        var progress = this.questionOrder.length
          ? this.getFirstUnansweredIndex()
          : parseInt(localStorage.getItem(STORAGE_PROGRESS_KEY), 10) || 0;
        if (progress > 0 && progress < QUESTIONS.length) {
          this.savedProgress = progress;
          this.showContinueModal = true;
        } else if (this.answeredCount >= QUESTIONS.length) {
          this.appState = 'result';
          this.$nextTick(function() { this.initResultPage(); }.bind(this));
        }
      } catch(e) {}
    },

    continueTest() {
      this.showContinueModal = false;
      this.currentQ = this.savedProgress;
      this.optionLocked = false;
      this.appState = 'quiz';
    },

    dismissContinue() {
      this.showContinueModal = false;
      this.selectedAnswers = {};
      this.questionOrder = [];
      this.currentQ = 0;
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_PROGRESS_KEY);
        localStorage.removeItem(STORAGE_ORDER_KEY);
      } catch(e) {}
    },

    closeSaveModal() {
      this.showSaveModal = false;
    },

    loadImageAsset(src) {
      return new Promise(function(resolve, reject) {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() { resolve(img); };
        img.onerror = function() { reject(new Error('logo load failed')); };
        img.src = src;
      });
    },

    generateResultImage() {
      var self = this;
      if (typeof html2canvas === 'undefined') {
        alert(this.t('result.imageFail'));
        return;
      }
      var el = this.$refs.resultCapture;
      if (!el) return;

      this.savingImage = true;
      this.previewImageUrl = '';

      this.$nextTick(function() {
        el.classList.add('scores-revealed');

        var doCapture = function() {
          return html2canvas(el, {
            scale: 2,
            useCORS: true,
            allowTaint: false,
            backgroundColor: '#F8F9FB',
            logging: false,
            scrollY: -window.scrollY,
            windowWidth: el.scrollWidth,
            width: el.scrollWidth,
            height: el.scrollHeight,
            onclone: function(clonedDoc) {
              var root = clonedDoc.querySelector('.result-capture');
              if (!root) return;
              root.classList.add('is-capturing', 'scores-revealed');
              root.style.paddingBottom = '100px';
              var rows = root.querySelectorAll('.score-row');
              rows.forEach(function(row) {
                row.style.opacity = '1';
                row.style.transform = 'none';
                row.style.animation = 'none';
              });
            }
          });
        };

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            doCapture().then(function(canvas) {
              return self.loadImageAsset(LOGO_URL).then(function(logo) {
                var padding = 24;
                var logoH = Math.round(36 * 2);
                var logoW = Math.round(logo.width * (logoH / logo.height));
                var footerH = logoH + padding * 2;
                var out = document.createElement('canvas');
                out.width = canvas.width;
                out.height = canvas.height + footerH;
                var ctx = out.getContext('2d');
                ctx.fillStyle = '#F8F9FB';
                ctx.fillRect(0, 0, out.width, out.height);
                ctx.drawImage(canvas, 0, 0);
                var lx = (out.width - logoW) / 2;
                var ly = canvas.height + padding;
                ctx.drawImage(logo, lx, ly, logoW, logoH);
                self.previewImageUrl = out.toDataURL('image/png', 0.92);
                self.showSaveModal = true;
              });
            }).catch(function(err) {
              console.error(err);
              alert(self.t('result.exportFail'));
            }).finally(function() {
              el.classList.remove('scores-revealed');
              self.savingImage = false;
            });
          });
        });
      });
    },

    downloadResultImage() {
      if (!this.previewImageUrl) return;
      var a = document.createElement('a');
      var d = new Date();
      var stamp = d.getFullYear() + '' + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
      a.href = this.previewImageUrl;
      a.download = (this.lang === 'zh' ? '产品经理能力画像_' : 'PM_Aptitude_Profile_') + stamp + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    },

    restartTest() {
      this.closeSaveModal();
      this.previewImageUrl = '';
      this.selectedAnswers = {};
      this.questionOrder = [];
      this.currentQ = 0;
      this.optionLocked = false;
      this.showContinueModal = false;
      this.appState = 'welcome';
      this.slideDirection = 'slide-left';
      if (this.radarChart) { this.radarChart.destroy(); this.radarChart = null; }
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_PROGRESS_KEY);
        localStorage.removeItem(STORAGE_ORDER_KEY);
      } catch(e) {}
    },

    initResultPage() {
      var self = this;
      this.$nextTick(function() {
        self.initRadarChart();
        self.fireConfetti();
        setTimeout(function() {
          var cap = self.$refs.resultCapture;
          if (cap) cap.classList.add('scores-revealed');
        }, 1100);
      });
    },

    fireConfetti() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      setTimeout(() => {
        if (typeof confetti !== 'undefined') {
          confetti({ particleCount: 80, spread: 70, origin: { y: 0.3, x: 0.5 }, colors: ['#4F46E5','#10B981','#F59E0B','#EF4444','#6366F1'] });
        }
      }, 400);
    },

    initRadarChart() {
      if (this.radarChart) { this.radarChart.destroy(); }
      const canvas = this.$refs.radarCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const scores = this.dimensionScores;
      const dims = ['JUDGE','LOGIC','EMPATHY','TASTE','TECH','COMM','GRIT'];
      const labels = dims.map(d => this.lang === 'zh' ? DIMENSION_NAMES[d] : DIMENSION_NAMES_EN[d]);
      const data = dims.map(d => scores[d] || 50);

      // Responsive size
      const w = Math.min(this.windowWidth - 64, 360);
      canvas.style.width = w + 'px';
      canvas.style.height = w + 'px';

      this.radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels,
          datasets: [{
            label: this.lang === 'zh' ? '你的能力画像' : 'Your Ability Profile',
            data,
            backgroundColor: 'rgba(99, 102, 241, 0.22)',
            borderColor: '#4F46E5',
            borderWidth: 2.5,
            pointBackgroundColor: '#4F46E5',
            pointBorderColor: '#ffffff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          layout: { padding: { top: 8, right: 24, bottom: 8, left: 24 } },
          animation: { duration: 900, easing: 'easeOutQuart' },
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              min: 0,
              ticks: {
                stepSize: 20,
                display: true,
                backdropColor: 'rgba(255,255,255,0.85)',
                font: { size: 9 },
                color: '#9CA3AF',
                count: 5
              },
              pointLabels: {
                font: { size: 11, weight: '600' },
                color: '#374151',
                padding: 10
              },
              grid: { color: 'rgba(79, 70, 229, 0.08)' },
              angleLines: { color: 'rgba(79, 70, 229, 0.12)' }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111827',
              titleFont: { size: 13 },
              bodyFont: { size: 14 },
              callbacks: { label: ctx => ' ' + ctx.raw + (this.lang === 'zh' ? ' 分' : ' pts') }
            }
          }
        }
      });
    },

    handleResize() {
      this.windowWidth = window.innerWidth;
      if (this.radarChart && this.appState === 'result') {
        this.initRadarChart();
      }
    }
  },
  watch: {
    selectedAnswers: {
      deep: true,
      handler() { this.saveProgress(); }
    },
    lang() {
      this.applyPageLang();
    }
  },
  mounted() {
    this.windowWidth = window.innerWidth;
    window.addEventListener('resize', this.handleResize);
    this.loadProgress();
    this.applyPageLang();
    var loading = document.getElementById('page-loading');
    if (loading) loading.style.display = 'none';
    document.getElementById('app').setAttribute('data-ready', '1');

    var self = this;
    window.addEventListener('keydown', function(e) {
      if (self.appState !== 'quiz') return;
      if (['1','2','3','4','5'].includes(e.key)) {
        var idx = parseInt(e.key, 10) - 1;
        var letters = ['A','B','C','D','E'];
        if (idx < letters.length) self.selectOption(letters[idx]);
      }
      if (e.key === 'ArrowLeft') { self.prevQuestion(); }
      if (e.key === 'ArrowRight' && self.selectedAnswers[self.currentQuestion.id] != null) {
        self.nextQuestion();
      }
    });
  },
  beforeUnmount() {
    window.removeEventListener('resize', this.handleResize);
  }
}).mount('#app');
}

var VUE_CDNS = [
  'https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js',
  'https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js',
  'https://cdn.bootcdn.net/ajax/libs/vue/3.4.21/vue.global.prod.min.js'
];
var CHART_CDNS = [
  'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
  'https://unpkg.com/chart.js@4.4.0/dist/chart.umd.min.js',
  'https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js'
];
var CONFETTI_CDNS = [
  'https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js',
  'https://unpkg.com/canvas-confetti@1.9.4/dist/confetti.browser.min.js'
];
var HTML2CANVAS_CDNS = [
  'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
  'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js',
  'https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'
];

loadScriptSequential(VUE_CDNS)
  .then(function() { return loadScriptSequential(CHART_CDNS); })
  .then(function() { return loadScriptSequential(CONFETTI_CDNS); })
  .then(function() { return loadScriptSequential(HTML2CANVAS_CDNS); })
  .then(bootApp)
  .catch(function() {
    showLoadError('依赖脚本加载失败，请连接网络后刷新。若使用 file:// 打开，请用本地服务器访问（如 npx serve）。');
  });
</script>
</body>
</html>
