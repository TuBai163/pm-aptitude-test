<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>测测你有多适合当产品经理（2026版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* 未挂载 Vue 前隐藏模板，避免露出 {{ }} 和无法点击的弹窗 */
[v-cloak] { display: none !important; }
/* ========== CSS Reset & Variables ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-primary: #4F46E5;
  --c-primary-light: #EEF2FF;
  --c-primary-dark: #4338CA;
  --c-success: #10B981;
  --c-success-light: #D1FAE5;
  --c-warning: #F59E0B;
  --c-warning-light: #FEF3C7;
  --c-danger: #EF4444;
  --c-danger-light: #FEE2E2;
  --c-bg: #F8F9FB;
  --c-card: #FFFFFF;
  --c-text: #111827;
  --c-text-secondary: #6B7280;
  --c-text-light: #9CA3AF;
  --c-border: #E5E7EB;
  --c-border-hairline: #F3F4F6;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-slide: cubic-bezier(0.32, 0.72, 0, 1);
  --slide-duration: 0.42s;
}

html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-sans);
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.6;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  position: relative;
}

/* ========== Utility ========== */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* ========== Nav Bar ========== */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 52px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--c-border-hairline);
}

.nav-back {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--c-text-secondary);
  font-size: 14px;
  cursor: pointer;
  padding: 8px 4px;
  min-width: 44px;
  min-height: 44px;
  border-radius: 8px;
  transition: color 0.15s;
  font-family: var(--font-sans);
}
.nav-back:hover { color: var(--c-text); }
.nav-back:disabled { opacity: 0.3; cursor: default; }

.nav-back svg { width: 16px; height: 16px; }

.nav-next {
  flex-direction: row-reverse;
  justify-content: flex-end;
}

.nav-progress-text {
  font-size: 13px;
  color: var(--c-text-secondary);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* ========== Progress Bar ========== */
.progress-bar-wrap {
  height: 3px;
  background: var(--c-border);
  transition: opacity 0.3s;
}
.progress-bar-fill {
  height: 100%;
  background: var(--c-primary);
  transition: width 0.4s var(--ease-out);
  border-radius: 0 2px 2px 0;
}
.progress-bar-fill.complete { background: var(--c-success); }

/* ========== Page Content ========== */
.page-content {
  flex: 1;
  padding: 20px 16px 32px;
  display: flex;
  flex-direction: column;
}

/* ========== Welcome Page ========== */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px 8px;
  animation: fadeInUp 0.6s var(--ease-out);
}

.welcome-icon {
  width: 72px;
  height: 72px;
  background: var(--c-primary-light);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.welcome-icon svg { width: 36px; height: 36px; color: var(--c-primary); }

.welcome h1 {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}

.welcome-sub {
  font-size: 14px;
  color: var(--c-text-secondary);
  line-height: 1.6;
  margin-bottom: 8px;
  max-width: 340px;
}

.welcome-hint {
  font-size: 11px;
  color: var(--c-text-light);
  line-height: 1.5;
  margin-bottom: 28px;
  max-width: 340px;
}

.welcome-info {
  display: flex;
  gap: 24px;
  margin-bottom: 28px;
}
.welcome-info-item { text-align: center; }
.welcome-info-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--c-primary);
  font-variant-numeric: tabular-nums;
}
.welcome-info-label { font-size: 11px; color: var(--c-text-light); margin-top: 2px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 32px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
  font-family: var(--font-sans);
  min-height: 48px;
  letter-spacing: 0.01em;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--c-primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3);
}
.btn-primary:hover { background: var(--c-primary-dark); }

.btn-ghost {
  background: transparent;
  color: var(--c-text-secondary);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 16px;
  min-height: 40px;
}
.btn-ghost:hover { color: var(--c-text); background: var(--c-border-hairline); }

.btn-secondary {
  background: var(--c-border);
  color: var(--c-text);
}
.btn-secondary:hover { background: #D1D5DB; }

/* ========== Continue Modal ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.2s var(--ease-out);
}

.modal {
  background: var(--c-card);
  border-radius: var(--radius);
  padding: 28px 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 0.25s var(--ease-out);
}

.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
.modal p { font-size: 14px; color: var(--c-text-secondary); margin-bottom: 20px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }
.modal-actions .btn { flex: 1; padding: 12px 20px; font-size: 14px; min-height: 44px; }

/* ========== Question Page ========== */
.page-content--quiz {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.question-stage {
  position: relative;
  overflow: hidden;
  flex: 1;
  width: 100%;
  min-height: min(68vh, 640px);
  touch-action: pan-y;
}

.question-wrap {
  display: flex;
  flex-direction: column;
  width: 100%;
  backface-visibility: hidden;
}

.question-type-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.tag-scenario { background: #EDE9FE; color: #5B21B6; }
.tag-preference { background: #DBEAFE; color: #1D4ED8; }
.tag-tech { background: #D1FAE5; color: #059669; }
.tag-social { background: #FEF3C7; color: #B45309; }

.question-text {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.7;
  margin-bottom: 20px;
  letter-spacing: 0.002em;
  max-height: 40vh;
  overflow-y: auto;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 14px 16px;
  background: var(--c-card);
  border: 2px solid var(--c-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  line-height: 1.55;
  color: var(--c-text);
  transition: all 0.15s var(--ease-out);
  font-family: var(--font-sans);
  min-height: 48px;
  -webkit-tap-highlight-color: transparent;
}

.option-btn:active { transform: scale(0.98); }
.option-btn:hover:not(.option-selected):not(:disabled) {
  border-color: #C7D2FE;
  background: #F5F7FF;
}
.option-btn:focus-visible {
  outline: 2px solid var(--c-primary);
  outline-offset: 2px;
}

.option-selected {
  border-color: var(--c-primary);
  background: var(--c-primary-light);
  box-shadow: 0 0 0 1px var(--c-primary);
}

.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 50%;
  background: var(--c-bg);
  font-size: 13px;
  font-weight: 700;
  color: var(--c-text-secondary);
  transition: all 0.15s;
}
.option-selected .option-letter {
  background: var(--c-primary);
  color: #fff;
}

.option-text { flex: 1; padding-top: 3px; }

/* ========== Slide Transitions（前进：旧题左出、新题从右入）========== */
.slide-left-enter-active,
.slide-left-leave-active,
.slide-right-enter-active,
.slide-right-leave-active {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  width: 100%;
  transition: transform var(--slide-duration) var(--ease-slide);
  will-change: transform;
}

.slide-left-leave-active,
.slide-right-leave-active {
  z-index: 1;
}

.slide-left-enter-active,
.slide-right-enter-active {
  z-index: 2;
}

/* 下一题：整体向左滑 */
.slide-left-enter-from {
  transform: translate3d(100%, 0, 0);
}
.slide-left-enter-to {
  transform: translate3d(0, 0, 0);
}
.slide-left-leave-from {
  transform: translate3d(0, 0, 0);
}
.slide-left-leave-to {
  transform: translate3d(-100%, 0, 0);
}

/* 上一题：整体向右滑 */
.slide-right-enter-from {
  transform: translate3d(-100%, 0, 0);
}
.slide-right-enter-to {
  transform: translate3d(0, 0, 0);
}
.slide-right-leave-from {
  transform: translate3d(0, 0, 0);
}
.slide-right-leave-to {
  transform: translate3d(100%, 0, 0);
}

/* ========== Fade Transitions ========== */
.fade-enter-active { transition: opacity 0.4s var(--ease-out); }
.fade-leave-active { transition: opacity 0.2s var(--ease-out); }
.fade-enter-from, .fade-leave-to { opacity: 0; }

/* ========== Result Page ========== */
.result-wrap {
  animation: fadeInUp 0.55s var(--ease-out);
  padding-top: max(12px, env(safe-area-inset-top, 0px));
  padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
  background:
    radial-gradient(ellipse 130% 55% at 50% -8%, rgba(79, 70, 229, 0.14), transparent 58%),
    radial-gradient(ellipse 70% 35% at 100% 12%, rgba(16, 185, 129, 0.07), transparent 50%),
    var(--c-bg);
}

.result-capture {
  background: transparent;
}

/* Hero */
.result-hero {
  position: relative;
  text-align: center;
  padding: 28px 20px 24px;
  margin-bottom: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg, #ffffff 0%, #f8f7ff 48%, #f0fdf9 100%);
  border: 1px solid rgba(79, 70, 229, 0.08);
  box-shadow: 0 12px 40px rgba(79, 70, 229, 0.08), 0 1px 0 rgba(255, 255, 255, 0.8) inset;
  overflow: hidden;
}

.result-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 85% 15%, rgba(16, 185, 129, 0.12), transparent 42%);
  pointer-events: none;
}

.result-hero-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-primary);
  background: var(--c-primary-light);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 14px;
  position: relative;
}

.result-hero h2 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 6px;
  position: relative;
}

.result-hero-sub {
  font-size: 14px;
  color: var(--c-text-secondary);
  margin-bottom: 18px;
  position: relative;
}

.result-hero-highlight {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px 18px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(16, 185, 129, 0.2);
  box-shadow: 0 4px 16px rgba(16, 185, 129, 0.1);
  position: relative;
}

.result-hero-highlight-label {
  font-size: 11px;
  font-weight: 700;
  color: #059669;
  letter-spacing: 0.04em;
}

.result-hero-highlight-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--c-text);
  max-width: 200px;
  text-align: left;
  line-height: 1.3;
}

.result-hero-highlight-pct {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 22px;
  font-weight: 800;
  color: var(--c-success);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

/* Section blocks */
.result-block {
  background: var(--c-card);
  border-radius: 18px;
  padding: 20px 18px;
  margin-bottom: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 4px 24px rgba(17, 24, 39, 0.04);
}

.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--c-text-secondary);
  margin-bottom: 16px;
  text-transform: uppercase;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 12px;
  border-radius: 2px;
  background: linear-gradient(180deg, var(--c-primary), #818cf8);
  flex-shrink: 0;
}

/* Radar */
.radar-container {
  padding: 8px 4px 4px;
  margin-bottom: 0;
  background: transparent;
  box-shadow: none;
  border: none;
}

.radar-container canvas {
  max-height: 300px;
  margin: 0 auto;
  display: block;
}

/* Dimension scores */
.scores-section { padding-bottom: 18px; }

.score-list { display: flex; flex-direction: column; gap: 14px; }

.score-row {
  opacity: 0;
  transform: translateY(10px);
  animation: scoreReveal 0.55s var(--ease-out) forwards;
}

.result-capture.scores-revealed .score-row,
.result-capture.is-capturing .score-row {
  opacity: 1 !important;
  transform: translateY(0) !important;
  animation: none !important;
}

.result-capture.is-capturing .score-bar-fill,
.result-capture.is-capturing .dir-bar-fill {
  transition: none !important;
}

.score-row-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.score-dim-tag {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--c-primary);
  background: var(--c-primary-light);
  padding: 3px 7px;
  border-radius: 6px;
  min-width: 52px;
  text-align: center;
}

.score-label {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--c-text);
  min-width: 0;
}

.score-value-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.score-value {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 17px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.score-value.is-top { color: #b45309; }

.score-top-badge {
  font-size: 10px;
  font-weight: 700;
  color: #b45309;
  background: var(--c-warning-light);
  padding: 2px 6px;
  border-radius: 6px;
}

.score-bar-bg {
  height: 10px;
  background: #eef0f4;
  border-radius: 999px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 1s var(--ease-out);
}

.score-bar-fill.primary {
  background: linear-gradient(90deg, #6366f1, var(--c-primary));
}

.score-bar-fill.gold {
  background: linear-gradient(90deg, #fbbf24, #f59e0b);
}

/* Direction */
.direction-section { background: transparent; border: none; box-shadow: none; padding: 0; }

.direction-list { display: flex; flex-direction: column; gap: 10px; }

.direction-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto auto;
  align-items: center;
  gap: 8px 12px;
  padding: 14px 16px;
  background: var(--c-card);
  border-radius: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 2px 12px rgba(17, 24, 39, 0.04);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
}

.direction-card.top-match {
  grid-template-columns: auto 1fr auto;
  padding: 18px 18px 16px;
  border: 1px solid rgba(16, 185, 129, 0.25);
  background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 55%);
  box-shadow: 0 8px 28px rgba(16, 185, 129, 0.12);
}

.dir-rank {
  grid-row: 1 / 3;
  width: 36px;
  height: 36px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 14px;
  font-weight: 800;
}

.dir-rank.top {
  background: linear-gradient(135deg, #34d399, var(--c-success));
  color: #fff;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
}

.dir-rank.normal {
  background: #f3f4f6;
  color: var(--c-text-secondary);
}

.dir-meta { min-width: 0; }

.dir-name {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--c-text);
  line-height: 1.35;
  margin-bottom: 8px;
}

.direction-card.top-match .dir-name {
  font-size: 15px;
}

.dir-bar-wrap {
  height: 8px;
  background: #eef0f4;
  border-radius: 999px;
  overflow: hidden;
}

.dir-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 1s var(--ease-out);
}

.dir-bar-fill.top { background: linear-gradient(90deg, #34d399, var(--c-success)); }
.dir-bar-fill.high { background: linear-gradient(90deg, #818cf8, var(--c-primary)); }
.dir-bar-fill.mid { background: linear-gradient(90deg, #fcd34d, var(--c-warning)); }
.dir-bar-fill.low { background: linear-gradient(90deg, #fca5a5, var(--c-danger)); }

.dir-pct-col {
  text-align: right;
  grid-row: 1 / 3;
  align-self: center;
}

.dir-pct {
  font-family: 'Plus Jakarta Sans', var(--font-sans);
  font-size: 18px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--c-text);
  line-height: 1;
}

.direction-card.top-match .dir-pct {
  font-size: 26px;
  color: var(--c-success);
}

.dir-badge {
  display: inline-block;
  margin-top: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.02em;
}

.dir-badge.best {
  background: var(--c-success-light);
  color: #047857;
}

/* Insights */
.insight-card {
  display: flex;
  gap: 14px;
  padding: 18px 16px;
  margin-bottom: 12px;
  background: var(--c-card);
  border-radius: 16px;
  border: 1px solid rgba(17, 24, 39, 0.05);
  box-shadow: 0 2px 16px rgba(17, 24, 39, 0.04);
}

.insight-card:last-of-type { margin-bottom: 0; }

.insight-card-accent {
  width: 4px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: stretch;
}

.insight-card--match .insight-card-accent { background: linear-gradient(180deg, var(--c-primary), #818cf8); }

function loadScriptSequential(urls) {
  return new Promise(function(resolve, reject) {
    var i = 0;
    function next() {
      if (i >= urls.length) {
        reject(new Error('script load failed: ' + urls[0]));
        return;
      }
      var s = document.createElement('script');
      s.src = urls[i++];
      s.async = false;
      s.onload = function() { resolve(); };
      s.onerror = function() { next(); };
      document.head.appendChild(s);
    }
    next();
  });
}

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i];
    a[i] = a[j];
    a[j] = t;
  }
  return a;
}

createApp({
  data() {
    return {
      appState: 'welcome', // welcome | quiz | result
      currentQ: 0,
      questionOrder: [],
      selectedAnswers: {},
      slideDirection: 'slide-left',
      showContinueModal: false,
      savedProgress: 0,
      optionLocked: false,
      showSaveModal: false,
      previewImageUrl: '',
      savingImage: false,
      radarChart: null,
      radarSize: 300,
      windowWidth: 375
    };
  },
  computed: {
    questions() {
      if (!this.questionOrder.length) return QUESTIONS;
      var self = this;
      return this.questionOrder.map(function(i) { return QUESTIONS[i]; });
    },
    currentQuestion() {
      return this.questions[this.currentQ] || QUESTIONS[0];
    },
    answeredCount() { return Object.keys(this.selectedAnswers).length; },
    progressPct() { return (this.answeredCount / QUESTIONS.length) * 100; },
    categoryLabels() {
      return { scenario:'情景判断', preference:'偏好与习惯', tech:'技术认知', social:'人际互动' };
    },

    // Calculate raw dimension scores (0-100)
    dimensionScores() {
      const scores = { JUDGE:0, LOGIC:0, EMPATHY:0, TASTE:0, TECH:0, COMM:0, GRIT:0 };
      const counts = { JUDGE:0, LOGIC:0, EMPATHY:0, TASTE:0, TECH:0, COMM:0, GRIT:0 };

      QUESTIONS.forEach((q) => {
        const answer = this.selectedAnswers[q.id];
        if (answer === null || answer === undefined) return;
        const dims = q.dims;
        Object.entries(dims).forEach(([dim, [weight, bestAnswer]]) => {
          if (answer === bestAnswer) {
            scores[dim] += weight;
          }
          counts[dim] += weight;
        });
      });

      // Normalize to 0-100
      const norm = {};
      Object.keys(scores).forEach(dim => {
        norm[dim] = counts[dim] > 0 ? Math.round((scores[dim] / counts[dim]) * 100) : 50;
      });
      return norm;
    },

    dimensionScoresDisplay() {
      const scores = this.dimensionScores;
      const dims = ['JUDGE','LOGIC','EMPATHY','TASTE','TECH','COMM','GRIT'];
      const maxScore = Math.max(...dims.map(d => scores[d]));
      return dims.map(key => ({
        key, label: DIMENSION_NAMES[key], score: scores[key], isTop: scores[key] === maxScore
      }));
    },

    directionResults() {
      const scores = this.dimensionScores;
      const results = [];
      Object.entries(WEIGHT_MATRIX).forEach(([dir, weights]) => {
        let total = 0, wSum = 0;
        Object.entries(weights).forEach(([dim, w]) => {
          total += (scores[dim] || 50) * w;
          wSum += w;
        });
        const pct = wSum > 0 ? Math.round(total / wSum) : 50;
        results.push({ key: dir, label: DIRECTION_NAMES[dir], pct });
      });
      results.sort((a, b) => b.pct - a.pct);
      return results.map((r, i) => ({
        ...r,
        barClass: i === 0 ? 'top' : r.pct >= 80 ? 'high' : r.pct >= 65 ? 'mid' : 'low'
      }));
    },

    analysisText() {
      const dirs = this.directionResults;
      const dims = this.dimensionScoresDisplay;
      const topDim = dims.find(d => d.isTop) || dims[0];
      const bottomDim = [...dims].sort((a,b) => a.score - b.score)[0];
      const topDir = dirs[0];
      const bottomDir = dirs[4];
      const variance = this.calcVariance(dims.map(d => d.score));

      const topMatch = this.getTopMatchAnalysis(topDir, topDim);
      const bottomMatch = this.getBottomMatchAnalysis(bottomDir, bottomDim);
      const general = this.getGeneralAnalysis(dims, variance);

      return { topMatch, bottomMatch, general };
    }
  },
  methods: {
    calcVariance(scores) {
      const mean = scores.reduce((a,b) => a+b, 0) / scores.length;
      return scores.reduce((a,b) => a + Math.pow(b-mean,2), 0) / scores.length;
    },

    getTopMatchAnalysis(dir, topDim) {
      const tpls = [];
      if (topDim.key === 'EMPATHY' && dir.key === 'toC') {
        tpls.push('你对用户需求的敏锐度是你的核心资产。在C端产品中，这种"能感受到用户哪里不爽"的直觉，是数据永远替代不了的。但要注意：同理心太强有时会让你过度迁就用户反馈而忽略了商业逻辑。');
      }
      if (topDim.key === 'LOGIC' && (dir.key === 'toB' || dir.key === 'toM')) {
        tpls.push('你的系统思维和逻辑拆解能力，在这个方向中如鱼得水。你很擅长在复杂的业务流程中找到那条最清晰的路径。你最大的优势是能把"一团乱麻"梳理成端到端的清晰方案。');
      }
      if (topDim.key === 'TECH' && dir.key === 'AI PM') {
        tpls.push('在2026年依然保持对技术的敏锐学习和判断力，这本身就是一种稀缺能力。做AI产品，你不会被工程师"这个做不了"的说辞拦住，因为你大概知道能做不能做。但你的挑战可能是"技术兴奋度过高"，不是所有问题都需要AI来解决。');
      }
      if (topDim.key === 'COMM') {
        tpls.push('你的沟通推动力是你最亮眼的能力。在产品经理这个没有行政权力但有无限责任的岗位上，能推动各方共识的人，就是项目的"隐形引擎"。重点发挥这个优势：在关键决策节点上，由你来主持对齐。');
      }
      if (topDim.key === 'GRIT') {
        tpls.push('你的续航力让人印象深刻。产品经理是一场马拉松，不是短跑。在2026年变化极快的环境下，能在混沌中持续前进本身就是非常珍贵的品质。建议发挥这个优势：主动承担需要"长期耐力"的项目。');
      }
      if (topDim.key === 'JUDGE') {
        tpls.push('你展现出很强的判断取舍能力，这在"做什么不做什么"的决策中至关重要。你的优势在于能看到问题的本质而不是被表面需求牵着走。进入这个方向后，建议前3个月重点建立你对业务领域知识的地图，让你的判断力有更扎实的底座。');
      }
      if (topDim.key === 'TASTE') {
        tpls.push('你的产品审美力是你的差异化竞争力。在AI能生成无数方案的时代，"选哪个"的能力比"做出来"的能力更稀缺。你的直觉能让你在众多方案中挑出真正好用的那个。建议多积累"好设计"的案例库，让你的审美从直觉升级为系统。');
      }

      if (tpls.length === 0) {
        tpls.push('你的能力画像与' + dir.label + '方向有很高的匹配度。进入这个方向后，你最大的优势在于你的能力组合与该方向的核心要求高度契合。建议在前3个月重点建立对行业和用户的深入理解，让你的能力在具体场景中落地。');
      }
      return tpls.join(' ');
    },

    getBottomMatchAnalysis(dir, bottomDim) {
      const tpls = [];
      if (dir.key === 'toG') {
        tpls.push('toG方向对你的挑战不在于"事情本身难"，而在于"做事的方式和你习惯的不一样"。toG的日常是大量的汇报文档、冗长的审批流程、以及"领导满意"比"用户满意"更重要的价值排序。如果你执意要去，最需要补的不是产品能力，而是"耐心倾听+精准表达"的沟通习惯。');
      }
      if (bottomDim.key === 'GRIT') {
        tpls.push('你各方面能力都不错，唯一需要关注的是"续航力"。产品经理是一场马拉松，你可能会在前3个月冲得很猛，但如果项目遇到反复，你可能比其他人更容易产生"我是不是不适合"的怀疑。给自己设置"小里程碑"，用短期正反馈来对冲长期不确定性。');
      }
      if (bottomDim.key === 'TECH') {
        tpls.push('在2026年，技术理解力的短板会比较明显地影响你在AI相关方向上的竞争力。但不一定要成为技术专家：关键是建立起对AI能力边界的基本认知框架。建议从每天花15分钟了解一个AI产品功能开始，积累"AI能做什么、不能做什么"的直觉。');
      }
      if (bottomDim.key === 'EMPATHY') {
        tpls.push('用户洞察力的短板可能让你在需要深度理解用户的方向上感到吃力。这不一定意味着你缺乏同理心，而可能是你更习惯用逻辑而非直觉去理解问题。建议刻意练习"用户观察"：每月找2-3个真实用户，不要问问题，就静静地看他们怎么用产品。');
      }
      if (bottomDim.key === 'COMM') {
        tpls.push('沟通推动力是你需要关注的维度。产品经理的工作本质是"影响力驱动"，没有行政权力但要推动各方前进。建议从小的协作习惯开始练习：每次会议前先想清楚"我想让谁、做什么、为什么"，把沟通从"信息传递"升级为"共识推动"。');
      }
      if (tpls.length === 0) {
        tpls.push(dir.label + '方向和你当前的画像匹配度相对较低。这并不意味着你不能做，而是需要刻意在某些维度上补强。建议先深入了解这个方向的真实工作日常，确认自己是否真的愿意接受这些挑战。');
      }
      return tpls.join(' ');
    },

    getGeneralAnalysis(dims, variance) {
      const tpls = [];
      if (variance < 80) {
        tpls.push('你的能力画像非常均衡——没有明显的短板，但也没有绝对突出的长板。这意味着你是一个"即插即用"型选手，放在哪个方向都能快速上手。但也意味着你可能需要在某个维度上有意识地"刻意突出"，找到你真正热爱的方向，在那个方向的核心维度上持续深耕，让你的长板长到别人一眼就能认出来。');
      } else {
        const top = dims.find(d => d.isTop);
        const sorted = [...dims].sort((a,b) => a.score - b.score);
        const bottom = sorted[0];
        tpls.push('你的能力画像有明显的长板和短板。你的' + top.label + '是你的核心竞争力，建议在职业选择中优先寻找能最大化发挥这个能力的场景。而' + bottom.label + '虽然目前是短板，但可以通过刻意练习来提升。关键是：不要为了补齐短板而牺牲长板的发挥空间——找到需要你长板的场景，短板用合作来补。');
      }
      return tpls.join(' ');
    },

    initQuestionOrder() {
      this.questionOrder = shuffleArray(QUESTIONS.map(function(_, i) { return i; }));
    },

    getFirstUnansweredIndex() {
      for (var i = 0; i < this.questionOrder.length; i++) {
        var q = QUESTIONS[this.questionOrder[i]];
        if (this.selectedAnswers[q.id] == null) return i;
      }
      return this.questionOrder.length;
    },

    migrateLegacyAnswers(parsed) {
      var keys = Object.keys(parsed);
      if (!keys.length) return parsed;
      var looksLegacy = keys.every(function(k) { return /^\d+$/.test(k) && parseInt(k, 10) < QUESTIONS.length; });
      if (!looksLegacy) return parsed;
      var next = {};
      keys.forEach(function(k) {
        var q = QUESTIONS[parseInt(k, 10)];
        if (q) next[q.id] = parsed[k];
      });
      return next;
    },

    startTest() {
      this.initQuestionOrder();
      this.selectedAnswers = {};
      this.currentQ = 0;
      this.optionLocked = false;
      this.slideDirection = 'slide-left';
      this.appState = 'quiz';
      this.saveProgress();
    },

    selectOption(letter) {
      if (this.optionLocked) return;

      var qid = this.currentQuestion.id;
      var hadAnswer = this.selectedAnswers[qid] != null;
      var sameAnswer = this.selectedAnswers[qid] === letter;

      this.selectedAnswers[qid] = letter;
      this.saveProgress();

      // 回退后：点已选选项 = 进入下一题；点其他选项 = 改答案后进入下一题
      if (hadAnswer) {
        var delay = sameAnswer ? 0 : 400;
        this.optionLocked = true;
        var self = this;
        setTimeout(function() {
          self.optionLocked = false;
          self.goNextQuestion();
        }, delay);
        return;
      }

      this.optionLocked = true;
      var self = this;
      setTimeout(function() {
        self.optionLocked = false;
        self.goNextQuestion();
      }, 500);
    },

    goNextQuestion() {
      if (this.answeredCount >= this.questions.length) {
        this.appState = 'result';
        this.$nextTick(function() { this.initResultPage(); }.bind(this));
        return;
      }
      if (this.currentQ < this.questions.length - 1) {
        this.slideDirection = 'slide-left';
        this.currentQ++;
      }
    },

    nextQuestion() {
      if (this.selectedAnswers[this.currentQuestion.id] == null) return;
      this.optionLocked = false;
      this.goNextQuestion();
    },

    prevQuestion() {
      if (this.currentQ > 0) {
        this.optionLocked = false;
        this.slideDirection = 'slide-right';
        this.currentQ--;
      }
    },

    saveProgress() {
      try {
        if (this.questionOrder.length) {
          localStorage.setItem(STORAGE_ORDER_KEY, JSON.stringify(this.questionOrder));
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this.selectedAnswers));
        var progress = this.questionOrder.length ? this.getFirstUnansweredIndex() : this.answeredCount;
        localStorage.setItem(STORAGE_PROGRESS_KEY, progress);
      } catch(e) {}
    },

    loadProgress() {
      try {
        var data = localStorage.getItem(STORAGE_KEY);
        if (!data) return;
        this.selectedAnswers = this.migrateLegacyAnswers(JSON.parse(data));
        var orderData = localStorage.getItem(STORAGE_ORDER_KEY);
        if (orderData) {
          this.questionOrder = JSON.parse(orderData);
        } else if (Object.keys(this.selectedAnswers).length) {
          this.initQuestionOrder();
        }
        var progress = this.questionOrder.length
          ? this.getFirstUnansweredIndex()
          : parseInt(localStorage.getItem(STORAGE_PROGRESS_KEY), 10) || 0;
        if (progress > 0 && progress < QUESTIONS.length) {
          this.savedProgress = progress;
          this.showContinueModal = true;
        } else if (this.answeredCount >= QUESTIONS.length) {
          this.appState = 'result';
          this.$nextTick(function() { this.initResultPage(); }.bind(this));
        }
      } catch(e) {}
    },

    continueTest() {
      this.showContinueModal = false;
      this.currentQ = this.savedProgress;
      this.optionLocked = false;
      this.appState = 'quiz';
    },

    dismissContinue() {
      this.showContinueModal = false;
      this.selectedAnswers = {};
      this.questionOrder = [];
      this.currentQ = 0;
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_PROGRESS_KEY);
        localStorage.removeItem(STORAGE_ORDER_KEY);
      } catch(e) {}
    },

    closeSaveModal() {
      this.showSaveModal = false;
    },

    loadImageAsset(src) {
      return new Promise(function(resolve, reject) {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() { resolve(img); };
        img.onerror = function() { reject(new Error('logo load failed')); };
        img.src = src;
      });
    },

    generateResultImage() {
      var self = this;
      if (typeof html2canvas === 'undefined') {
        alert('截图组件未加载，请刷新页面后重试');
        return;
      }
      var el = this.$refs.resultCapture;
      if (!el) return;

      this.savingImage = true;
      this.previewImageUrl = '';

      this.$nextTick(function() {
        el.classList.add('is-capturing', 'scores-revealed');

        var doCapture = function() {
          return html2canvas(el, {
            scale: 2,
            useCORS: true,
            allowTaint: false,
            backgroundColor: '#F8F9FB',
            logging: false,
            scrollY: -window.scrollY,
            windowWidth: el.scrollWidth,
            width: el.scrollWidth,
            height: el.scrollHeight,
            onclone: function(clonedDoc) {
              var root = clonedDoc.querySelector('.result-capture');
              if (!root) return;
              root.classList.add('is-capturing', 'scores-revealed');
              var rows = root.querySelectorAll('.score-row');
              rows.forEach(function(row) {
                row.style.opacity = '1';
                row.style.transform = 'none';
                row.style.animation = 'none';
              });
            }
          });
        };

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            doCapture().then(function(canvas) {
              return self.loadImageAsset(LOGO_URL).then(function(logo) {
                var padding = 32;
                var logoH = Math.round(36 * 2);
                var logoW = Math.round(logo.width * (logoH / logo.height));
                var footerH = logoH + padding * 2;
                var out = document.createElement('canvas');
                out.width = canvas.width;
                out.height = canvas.height + footerH;
                var ctx = out.getContext('2d');
                ctx.fillStyle = '#F8F9FB';
                ctx.fillRect(0, 0, out.width, out.height);
                ctx.drawImage(canvas, 0, 0);
                var lx = (out.width - logoW) / 2;
                var ly = canvas.height + padding;
                ctx.drawImage(logo, lx, ly, logoW, logoH);
                self.previewImageUrl = out.toDataURL('image/png', 0.92);
                self.showSaveModal = true;
              });
            }).catch(function(err) {
              console.error(err);
              alert('生成图片失败，请确认通过网页服务器访问（非直接打开文件）后重试');
            }).finally(function() {
              el.classList.remove('is-capturing');
              self.savingImage = false;
            });
          });
        });
      });
    },

    downloadResultImage() {
      if (!this.previewImageUrl) return;
      var a = document.createElement('a');
      var d = new Date();
      var stamp = d.getFullYear() + '' + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
      a.href = this.previewImageUrl;
      a.download = '产品经理能力画像_' + stamp + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    },

    restartTest() {
      this.closeSaveModal();
      this.previewImageUrl = '';
      this.selectedAnswers = {};
      this.questionOrder = [];
      this.currentQ = 0;
      this.optionLocked = false;
      this.showContinueModal = false;
      this.appState = 'welcome';
      this.slideDirection = 'slide-left';
      if (this.radarChart) { this.radarChart.destroy(); this.radarChart = null; }
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(STORAGE_PROGRESS_KEY);
        localStorage.removeItem(STORAGE_ORDER_KEY);
      } catch(e) {}
    },

    initResultPage() {
      var self = this;
      this.$nextTick(function() {
        self.initRadarChart();
        self.fireConfetti();
        setTimeout(function() {
          var cap = self.$refs.resultCapture;
          if (cap) cap.classList.add('scores-revealed');
        }, 1100);
      });
    },

    fireConfetti() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      setTimeout(() => {
        if (typeof confetti !== 'undefined') {
          confetti({ particleCount: 80, spread: 70, origin: { y: 0.3, x: 0.5 }, colors: ['#4F46E5','#10B981','#F59E0B','#EF4444','#6366F1'] });
        }
      }, 400);
    },

    initRadarChart() {
      if (this.radarChart) { this.radarChart.destroy(); }
      const canvas = this.$refs.radarCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const scores = this.dimensionScores;
      const dims = ['JUDGE','LOGIC','EMPATHY','TASTE','TECH','COMM','GRIT'];
      const labels = dims.map(d => DIMENSION_NAMES[d]);
      const data = dims.map(d => scores[d] || 50);

      // Responsive size
      const w = Math.min(this.windowWidth - 64, 360);
      canvas.style.width = w + 'px';
      canvas.style.height = w + 'px';

      this.radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels,
          datasets: [{
            label: '你的能力画像',
            data,
            backgroundColor: 'rgba(99, 102, 241, 0.22)',
            borderColor: '#4F46E5',
            borderWidth: 2.5,
            pointBackgroundColor: '#4F46E5',
            pointBorderColor: '#ffffff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: { duration: 900, easing: 'easeOutQuart' },
          scales: {
            r: {
              beginAtZero: true,
              max: 100,
              min: 0,
              ticks: {
                stepSize: 20,
                display: true,
                backdropColor: 'rgba(255,255,255,0.85)',
                font: { size: 9 },
                color: '#9CA3AF',
                count: 5
              },
              pointLabels: {
                font: { size: 11, weight: '600' },
                color: '#374151',
                padding: 6
              },
              grid: { color: 'rgba(79, 70, 229, 0.08)' },
              angleLines: { color: 'rgba(79, 70, 229, 0.12)' }
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#111827',
              titleFont: { size: 13 },
              bodyFont: { size: 14 },
              callbacks: { label: ctx => ' ' + ctx.raw + ' 分' }
            }
          }
        }
      });
    },

    handleResize() {
      this.windowWidth = window.innerWidth;
      if (this.radarChart && this.appState === 'result') {
        this.initRadarChart();
      }
    }
  },
  watch: {
    selectedAnswers: {
      deep: true,
      handler() { this.saveProgress(); }
    }
  },
  mounted() {
    this.windowWidth = window.innerWidth;
    window.addEventListener('resize', this.handleResize);
    this.loadProgress();
    var loading = document.getElementById('page-loading');
    if (loading) loading.style.display = 'none';
    document.getElementById('app').setAttribute('data-ready', '1');

    var self = this;
    window.addEventListener('keydown', function(e) {
      if (self.appState !== 'quiz') return;
      if (['1','2','3','4','5'].includes(e.key)) {
        var idx = parseInt(e.key, 10) - 1;
        var letters = ['A','B','C','D','E'];
        if (idx < letters.length) self.selectOption(letters[idx]);
      }
      if (e.key === 'ArrowLeft') { self.prevQuestion(); }
      if (e.key === 'ArrowRight' && self.selectedAnswers[self.currentQuestion.id] != null) {
        self.nextQuestion();
      }
    });
  },
  beforeUnmount() {
    window.removeEventListener('resize', this.handleResize);
  }
}).mount('#app');
}

  'https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js'
];
var CONFETTI_CDNS = [

  'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js',
  'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js',
  'https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'
];

loadScriptSequential(VUE_CDNS)
  .then(function() { return loadScriptSequential(CHART_CDNS); })
  .then(function() { return loadScriptSequential(CONFETTI_CDNS); })
  .then(function() { return loadScriptSequential(HTML2CANVAS_CDNS); })
  .then(bootApp)
  .catch(function() {
    showLoadError('依赖脚本加载失败，请连接网络后刷新。若使用 file:// 打开，请用本地服务器访问（如 npx serve）。');
  });
</script>
